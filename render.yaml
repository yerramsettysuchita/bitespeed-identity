services:
  - type: web
    name: bitespeed-identity
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in the Render dashboard
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "*"